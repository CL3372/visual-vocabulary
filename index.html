<!doctype html>
<html lang="en">

    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />

    <title>Visual Vocabulary — Learn 3,000+ words in 15 languages with photos</title>

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://visual-vocab.vercel.app/" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Visual Vocabulary — Learn 3,000+ words in 15 languages" />

    <meta name="twitter:image" content="https://visual-vocab.vercel.app/og-image.png" />

    <!-- JSON-LD -->
    <script type="application/ld+json">

      "@context": "https://schema.org",

      "name": "Visual Vocabulary",
      "url": "https://visual-vocab.vercel.app",
      "description": "Learn 3,000+ vocabulary words in 15 languages through beautiful photography. Covers food, verbs, emotions, numbers, family, occupations, weather and more.",

      "operatingSystem": "Any",
      "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" },
      "inLanguage": ["en","es","pt","fr","de","it","hi","ru","tr","ja","zh","ko","ar"]
    }
    </script>
  </head>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
