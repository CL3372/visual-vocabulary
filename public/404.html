<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Not Found | Visual Vocabulary</title>
  <meta name="robots" content="noindex" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f8fafc;
      color: #0f172a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }
    .emoji { font-size: 5rem; margin-bottom: 1.5rem; line-height: 1; }
    h1 { font-size: 1.75rem; font-weight: 800; margin-bottom: 0.5rem; }
    p { font-size: 1rem; color: #64748b; margin-bottom: 2rem; max-width: 360px; line-height: 1.6; }
    .btn {
      display: inline-block;
      background: #4f46e5;
      color: #fff;
      font-size: 1rem;
      font-weight: 700;
      padding: 0.85rem 2rem;
      border-radius: 14px;
      text-decoration: none;
      transition: opacity 0.15s;
      margin-bottom: 1rem;
    }
    .btn:hover { opacity: 0.9; }
    .links { display: flex; flex-wrap: wrap; justify-content: center; gap: 0.75rem; margin-top: 0.5rem; }
    .link {
      font-size: 0.85rem;
      color: #4f46e5;
      text-decoration: none;
      padding: 0.4rem 0.9rem;
      border: 1px solid #c7d2fe;
      border-radius: 9999px;
      background: #fff;
    }
    .link:hover { background: #eff6ff; }
    .code { font-size: 0.75rem; color: #94a3b8; margin-top: 2.5rem; }
  </style>
</head>
<body>
  <div class="emoji">🔍</div>
  <h1>Page not found</h1>
  <p>That page doesn't exist. Try searching for a category or head back to the app.</p>

  <a href="/" class="btn">Back to Visual Vocabulary</a>

  <div class="links">
    <a href="/learn/animals" class="link">🦁 Animals</a>
    <a href="/learn/italian-cuisine" class="link">🇮🇹 Italian Cuisine</a>
    <a href="/learn/verbs" class="link">🏃 Verbs</a>
    <a href="/learn/emotions" class="link">😊 Emotions</a>
    <a href="/learn/japanese-cuisine" class="link">🇯🇵 Japanese Cuisine</a>
    <a href="/learn/fruits" class="link">🍎 Fruits</a>
  </div>

  <p class="code">404 — visualvocab.io</p>

  <script>
    // After 8 seconds redirect to home automatically
    setTimeout(() => window.location.href = '/', 8000);
  </script>
</body>
</html>
