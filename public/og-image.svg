<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1b4b"/>
      <stop offset="100%" style="stop-color:#312e81"/>
    </linearGradient>
    <linearGradient id="pill" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative circles -->
  <circle cx="1050" cy="100" r="200" fill="#4f46e5" opacity="0.15"/>
  <circle cx="150" cy="530" r="150" fill="#7c3aed" opacity="0.12"/>
  <circle cx="900" cy="560" r="120" fill="#4f46e5" opacity="0.1"/>

  <!-- Grid pattern (subtle) -->
  <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
    <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#ffffff" stroke-width="0.3" opacity="0.08"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Emoji strip -->
  <text x="80" y="155" font-size="48" font-family="Apple Color Emoji, Segoe UI Emoji, sans-serif" opacity="0.9">📸</text>
  <text x="155" y="155" font-size="48" font-family="Apple Color Emoji, Segoe UI Emoji, sans-serif" opacity="0.9">🌍</text>
  <text x="230" y="155" font-size="48" font-family="Apple Color Emoji, Segoe UI Emoji, sans-serif" opacity="0.9">🍜</text>
  <text x="305" y="155" font-size="48" font-family="Apple Color Emoji, Segoe UI Emoji, sans-serif" opacity="0.9">🦁</text>
  <text x="380" y="155" font-size="48" font-family="Apple Color Emoji, Segoe UI Emoji, sans-serif" opacity="0.9">🎨</text>
  <text x="455" y="155" font-size="48" font-family="Apple Color Emoji, Segoe UI Emoji, sans-serif" opacity="0.9">🏃</text>

  <!-- Main headline -->
  <text x="80" y="290" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="72" font-weight="800" fill="#ffffff" letter-spacing="-1">Visual</text>
  <text x="80" y="375" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="72" font-weight="800" fill="#a5b4fc" letter-spacing="-1">Vocabulary</text>

  <!-- Tagline -->
  <text x="80" y="435" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="28" fill="#c7d2fe" opacity="0.9">Learn 3,000+ words through beautiful photography</text>

  <!-- Stat pills -->
  <rect x="80" y="470" width="175" height="44" rx="22" fill="url(#pill)" opacity="0.9"/>
  <text x="167" y="498" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="18" font-weight="700" fill="#ffffff" text-anchor="middle">15 languages</text>

  <rect x="268" y="470" width="195" height="44" rx="22" fill="url(#pill)" opacity="0.9"/>
  <text x="365" y="498" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="18" font-weight="700" fill="#ffffff" text-anchor="middle">100+ categories</text>

  <rect x="476" y="470" width="130" height="44" rx="22" fill="url(#pill)" opacity="0.9"/>
  <text x="541" y="498" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="18" font-weight="700" fill="#ffffff" text-anchor="middle">Free</text>

  <!-- Right side — language flags -->
  <text x="820" y="200" font-family="Apple Color Emoji, Segoe UI Emoji, sans-serif" font-size="64" opacity="0.85">🇬🇧</text>
  <text x="920" y="200" font-family="Apple Color Emoji, Segoe UI Emoji, sans-serif" font-size="64" opacity="0.85">🇪🇸</text>
  <text x="1020" y="200" font-family="Apple Color Emoji, Segoe UI Emoji, sans-serif" font-size="64" opacity="0.85">🇫🇷</text>
  <text x="820" y="290" font-family="Apple Color Emoji, Segoe UI Emoji, sans-serif" font-size="64" opacity="0.85">🇩🇪</text>
  <text x="920" y="290" font-family="Apple Color Emoji, Segoe UI Emoji, sans-serif" font-size="64" opacity="0.85">🇯🇵</text>
  <text x="1020" y="290" font-family="Apple Color Emoji, Segoe UI Emoji, sans-serif" font-size="64" opacity="0.85">🇵🇹</text>
  <text x="820" y="380" font-family="Apple Color Emoji, Segoe UI Emoji, sans-serif" font-size="64" opacity="0.85">🇮🇳</text>
  <text x="920" y="380" font-family="Apple Color Emoji, Segoe UI Emoji, sans-serif" font-size="64" opacity="0.85">🇰🇷</text>
  <text x="1020" y="380" font-family="Apple Color Emoji, Segoe UI Emoji, sans-serif" font-size="64" opacity="0.85">🇸🇦</text>
  <text x="820" y="470" font-family="Apple Color Emoji, Segoe UI Emoji, sans-serif" font-size="64" opacity="0.85">🇨🇳</text>
  <text x="920" y="470" font-family="Apple Color Emoji, Segoe UI Emoji, sans-serif" font-size="64" opacity="0.85">🇮🇹</text>
  <text x="1020" y="470" font-family="Apple Color Emoji, Segoe UI Emoji, sans-serif" font-size="64" opacity="0.85">🇷🇺</text>

  <!-- Domain -->
  <text x="80" y="580" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="22" fill="#818cf8" opacity="0.8">visual-vocabulary.vercel.app</text>
